<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form - Ramnujam Public School</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lato', sans-serif; background: #F5F0E8; }

        .form-header {
            background: #022679;
            padding: 24px 40px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .form-header img { height: 60px; }
        .form-header h1 {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 24px;
        }
        .form-header p { color: rgba(255,255,255,0.7); font-size: 13px; }

        .form-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 16px;
            padding: 48px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.08);
        }

        .form-section-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: #022679;
            margin: 32px 0 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid #FFC107;
        }
        .form-section-title:first-child { margin-top: 0; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full { grid-column: 1 / -1; }

        label {
            font-size: 13px;
            font-weight: 700;
            color: #444;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input, select, textarea {
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Lato', sans-serif;
            color: #333;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #022679;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #022679;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Lato', sans-serif;
            cursor: pointer;
            margin-top: 32px;
            transition: background 0.2s, transform 0.2s;
            letter-spacing: 0.5px;
        }
        .submit-btn:hover {
            background: #011650;
            transform: translateY(-2px);
        }

        #success-msg {
            display: none;
            background: #e8f5e9;
            border: 1px solid #66bb6a;
            color: #2e7d32;
            padding: 16px 24px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 15px;
            text-align: center;
        }
        #error-msg {
            display: none;
            background: #ffebee;
            border: 1px solid #ef9a9a;
            color: #c62828;
            padding: 16px 24px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 15px;
            text-align: center;
        }

        @media(max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-container { padding: 28px 20px; margin: 20px; }
        }
    </style>
</head>
<body>

<div class="form-header">
<img src="../second_logo.png" alt="School Logo" id="logo-img">
    <div>
        <h1>Admission Form 2025–26</h1>
        <p>Ramnujam Public School, Garhani Bhojpur</p>
    </div>
</div>

<div class="form-container">

    <div class="form-section-title">Student Details</div>
    <div class="form-grid">
        <div class="form-group full">
            <label>Student Full Name *</label>
            <input type="text" id="studentName" placeholder="Enter full name" required>
        </div>
        <div class="form-group">
            <label>Date of Birth *</label>
            <input type="date" id="dob" title="Date of Birth" placeholder="YYYY-MM-DD" required>
        </div>
        <div class="form-group">
            <label for="gender">Gender *</label>
            <select id="gender" aria-required="true">
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>
        <div class="form-group">
            <label for="classApplied">Class Applying For *</label>
            <select id="classApplied" title="Class Applying For" aria-required="true">
                <option value="">Select Class</option>
                <option>Nursery</option>
                <option>KG</option>
                <option>Class 1</option>
                <option>Class 2</option>
                <option>Class 3</option>
                <option>Class 4</option>
                <option>Class 5</option>
                <option>Class 6</option>
                <option>Class 7</option>
                <option>Class 8</option>`
            </select>
        </div>
    </div>

    <div class="form-section-title">Parent / Guardian Details</div>
    <div class="form-grid">
        <div class="form-group">
            <label>Father's Name *</label>
            <input type="text" id="fatherName" placeholder="Father's full name">
        </div>
        <div class="form-group">
            <label>Mother's Name *</label>
            <input type="text" id="motherName" placeholder="Mother's full name">
        </div>
        <div class="form-group">
            <label>Phone Number *</label>
            <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX">
        </div>
        <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="email" placeholder="email@example.com">
        </div>
        <div class="form-group full">
            <label>Home Address</label>
            <textarea id="address" rows="3" placeholder="Full address..."></textarea>
        </div>
    </div>

    <button class="submit-btn" onclick="submitForm()">
        Submit Admission Form
    </button>

    <div id="success-msg">✅ Form submitted successfully! Check your email for confirmation.</div>
    <div id="error-msg">❌ Something went wrong. Please try again.</div>

</div>

<script>
async function submitForm() {
    const data = {
        
        studentName: document.getElementById('studentName').value,
        dob: document.getElementById('dob').value,
        gender: document.getElementById('gender').value,
        classApplied: document.getElementById('classApplied').value,
        fatherName: document.getElementById('fatherName').value,
        motherName: document.getElementById('motherName').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        address: document.getElementById('address').value
    };

    if (!data.studentName  || !data.classApplied || !data.phone || !data.email) {
        alert('Please fill all required fields!');
        return;
    }
    try {
            const res = await fetch('https://ramanujam-public-school.onrender.com/api/admission', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.success) {
            document.getElementById('success-msg').style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    } catch (err) {
        document.getElementById('error-msg').style.display = 'block';
    }
}
</script>

</body>
</html>
